<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function ganjil_genap() {
            var nilai = document.proses.bil1.value;
            if(nilai%2 == 0)
                {
                    document.getElementById("hasil").innerHTML = "bilangan genpa";
                } else
                {
                    document.getElementById("hasil").innerHTML = "bilangan ganjil";
                }
        }
    </script>
</head>
<body>
    <h2>hello</h2>
    <form method="post" name="proses">
        Bilangan 1 : <input type="text" name="bil1">
        <input type="button" name="button1" value="cek" onclick="ganjil_genap">
    </form>
</body>
</html>
