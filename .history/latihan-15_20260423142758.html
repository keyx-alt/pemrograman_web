<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        var nilai = prompt("masukkan nilai 0 sampai 100", 0);
        var hasil = ""
        if (nilai >= 70)
            {
                hasil = "lulus";
            } else 
            {
                hasil = "mengelang";
            }
            document.write("hasil dari nilai anda : " + hasil);
    </script>
</head>

    <h2>hello</h2>
