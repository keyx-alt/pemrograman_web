<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Ordered list</h2>

    <ol type="I">
        <li>Teknik Komputar</li>
        <li>Teknik Infor</li>
        <li>Teknik Geo</li>
    </ol>

    <h2>Unordered list</h2>

    <ul>
        <li>Teknik Kom</li>
        <li>Teknik Inf</li>
        <li>Teknik Geo</li>
    </ul>

    <table border="2">
        <tr>
            <th>no</th>
            <th>nama</th>
            <th>jenis</th>
        </tr>
        <tr>
            <td>1</td>
            <td>budi</td>
            <td>L</td>
        </tr>
        <tr>
            <td>2</td>
            <td>ina</td>
            <td>P</td>
        </tr>
    </table>

     <table border="2">
        <tr>
            <th>no</th>
            <th colspan="3">nama</th>
            <th>jenis</th>
        </tr>
        <tr>
            <td>1</td>
            <td>budi</td>
            <td>L</td>
        </tr>
        <tr>
            <td>2</td>
            <td>ina</td>
            <td>P</td>
        </tr>
    </table>
</body>
</html>
